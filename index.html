<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050911"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><title>DART SCORE v16</title></head><body>
<main id="game">
<header class="top"><div><div class="logo">🎯 DART <span>SCORE</span></div><div class="sub">v16 · BIG SCOREBOARD</div></div><div id="gameTitle" class="title">SPILL / 501</div><nav><button onclick="showPage('start')">Start</button><button onclick="showPage('history')">Historikk</button><button onclick="showPage('profile')">Treffprofil</button><button onclick="showPage('settings')">Innstillinger</button></nav></header>
<section id="players" class="players"></section>
<section class="mid"><aside class="roast"><h3>ROAST 🔥</h3><div id="roastMain" class="rmain">Klar.</div><div id="roastSub" class="rsub">Ingen slipper unna.</div></aside><section class="board"><div class="active"><small>AKTIV SPILLER</small><div id="activeName" class="aname"></div><div id="activeScore" class="ascore"></div><p>Før kast: <b id="beforeScore"></b></p><p>Checkout: <b id="checkout"></b></p><div id="status" class="status"></div></div><div class="darts"><div id="dartCards" class="dartcards"></div><div class="live"><div><small>SUM</small><b id="sumNow">0</b></div><div><small>IGJEN</small><b id="scoreNow">501</b></div><div><small>LIVE</small><span id="trail">501</span></div></div></div></section><aside class="side"><button onclick="giveYellow()"><small>🟨 GULT</small><b id="yellow">0</b></button><div><small>PILER</small><b id="dartsThrown">0</b></div><div><small>IN</small><b id="inDarts">0</b></div><div><small>HJELM</small><b id="helmet">0</b></div></aside></section>
<section class="keypad"><div class="mods"><button id="btnD" onclick="toggleMod('D')" class="double">D</button><button onclick="miss()" class="miss">M</button></div><div id="numbers" class="numbers"></div><button id="btnT" onclick="toggleMod('T')" class="triple">T</button></section>
</main>
<div id="winnerModal" class="modal"><div class="box"><h1 id="winnerTitle">VINNER</h1><div id="winnerText" class="winner"></div><button onclick="closeWinner()">OK</button><button class="primary" onclick="showPage('start')">Nytt spill</button></div></div>
<section id="start" class="page"><div class="panel row"><h1>Start spill</h1><button onclick="showGame()">Til spill</button><button class="primary" onclick="startGame()">Start nytt spill</button></div><div class="grid"><div class="panel"><h2>Oppsett</h2><div class="row"><label>Spill <select id="startScore" class="field"><option>301</option><option selected>501</option><option>701</option></select></label><label>IN <select id="inRule" class="field"><option value="single">Single In</option><option selected value="master">Master In</option></select></label><label>OUT <select id="outRule" class="field"><option value="single">Single Out</option><option value="double">Double Out</option><option selected value="master">Master Out</option></select></label></div><h2>Spillere</h2><div id="pickList" class="pickList"></div><div class="row"><input id="newName" class="field" placeholder="Nytt navn"><button onclick="addPlayerName()">Legg til</button></div></div><div class="panel"><h2>Backup</h2><button onclick="exportBackup()">Eksporter backup</button><input type="file" accept="application/json" onchange="importBackup(event)"></div></div></section>
<section id="history" class="page"><div class="panel row"><h1>Historikk</h1><button onclick="showGame()">Tilbake</button><label>Spiller <select id="historyPlayer" class="field" onchange="renderHistory()"></select></label></div><div class="panel"><table id="historyStats" class="table"></table></div><div class="panel"><table id="historyThrows" class="table"></table></div></section>
<section id="profile" class="page"><div class="panel row"><h1>Treffprofil</h1><button onclick="showGame()">Tilbake</button><select id="profilePlayer" class="field" onchange="renderProfile()"></select></div><div id="profileCards" class="cards"></div><div id="hitTable" class="panel"></div></section>
<section id="settings" class="page"><div class="panel row"><h1>Innstillinger</h1><button onclick="showGame()">Tilbake</button><button class="primary" onclick="saveSettings()">Lagre</button></div><div class="panel row"><label><input type="checkbox" id="setRoast"> Roast</label><label><input type="checkbox" id="setHelmet"> Hjelmregel</label><label><input type="checkbox" id="setShootout"> 45-pilers bonusrunde</label></div><div class="panel row"><button class="danger" onclick="clearAllStats()">Slett historikk</button><button class="danger" onclick="factoryReset()">Nullstill app</button></div></section>
<script src="roasts.js"></script><script src="app.js"></script></body></html>
